name: Alif Bank

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run scraper
        env:
          FIRECRAWL_API: ${{ secrets.FIRECRAWL_API }}
          OPENROUTER_API: ${{ secrets.OPENROUTER_API }}
        run: python banks/alif/main.py

      - name: Upload answer
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: |
            answer.txt
            full_markdown.txt
