name: Scrape Currency Rates

on:
  schedule:
    - cron: '0 6 * * *'   # Ҳар рӯз соати 6
  workflow_dispatch:        # Дастӣ низ

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python насб
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Китобхонаҳо насб
        run: |
          pip install playwright requests
          playwright install chromium
          playwright install-deps chromium

      - name: Scrape иҷро
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          WEBSITE_URL: "https://alif.tj"
        run: python main.py

      - name: Натиҷаро commit кун
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add results/output.json
          git commit -m "✅ Қурбҳо навшуданд: $(date)" || echo "Тағйирот нест"
          git push
